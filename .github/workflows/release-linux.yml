name: Release (Linux)

# Manual trigger only. Builds the Linux AppImage and attaches it to an EXISTING
# GitHub Release. Does not bump the version or create a tag — run the Windows
# release first (it owns versioning and creates the release), then run this to
# add the Linux asset. See docs/LINUX_PORT.md.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (e.g. v0.1.80). Defaults to the package.json version."
        required: false
        default: ""
        type: string
      skip_notes_patch:
        description: "Upload the AppImage without editing the GitHub Release body"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Build only; do not upload or edit the release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-linux
  cancel-in-progress: false

jobs:
  release-linux:
    name: GitHub Release (Linux AppImage)
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@1.96.0

      - name: Install Tauri Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            build-essential \
            pkg-config \
            libfuse2t64

      - run: npm ci

      - name: Build and publish Linux AppImage
        run: |
          args=()
          if [ -n "${{ inputs.tag }}" ]; then args+=("--tag" "${{ inputs.tag }}"); fi
          if [ "${{ inputs.skip_notes_patch }}" = "true" ]; then args+=("--skip-notes-patch"); fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then args+=("--dry-run"); fi
          # CI checkout is clean except for gitignored build output; allow the
          # build dir without failing the clean-worktree guard.
          args+=("--allow-dirty")
          bash scripts/release-github-linux.sh "${args[@]}"
