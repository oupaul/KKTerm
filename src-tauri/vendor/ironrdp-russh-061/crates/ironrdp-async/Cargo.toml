[package]
name = "ironrdp-async"
version = "0.9.0"
readme = "README.md"
description = "Provides `Future`s wrapping the IronRDP state machines conveniently"
edition = "2024"
rust-version = "1.89"
license = "MIT OR Apache-2.0"
homepage = "https://github.com/Devolutions/IronRDP"
repository = "https://github.com/Devolutions/IronRDP"
authors = ["Devolutions Inc. <infos@devolutions.net>"]
keywords = ["rdp", "remote-desktop", "network", "client", "protocol"]
categories = ["network-programming"]

[lib]
doctest = false
test = false

[dependencies]
ironrdp-connector = { path = "../ironrdp-connector", version = "0.9" } # public
ironrdp-core = { version = "0.2", features = ["alloc"] } # public
ironrdp-pdu = { version = "0.8" } # public
tracing = { version = "0.1", features = ["log"] }
bytes = "1" # public
